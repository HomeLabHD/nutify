
---
spec:
  inputs:
    as:
      default: ntfy-web-push
    stage:
      default: ntfy
    ntfy_user:
      description: 'ntfy username that will be used to authenticate to a ntfy url via curl and send a web-push notification'
    ntfy_pass:
      description: 'ntfy password that will be used to authenticate to a ntfy url via curl and send a web-push notification.'
    msg_body:
      default: '${CI_PROJECT_NAME}: ${MSG_STATE} (ref ${CI_COMMIT_REF_NAME})'
      description: 'The message that should be sent using this ntfy component.'
    msg_prio:
      default: ${CI_PROJECT_DIR}/ansible
      description: 'The priority level of the notification that will be sent.'
    msg_tag:
      description: 'Tags/Emoji that the message should be marked with.'

---

'$[[ inputs.as ]]':
  stage: '$[[ inputs.stage ]]'
  image:
    name: alpine:latest
    entrypoint: [""]
  variables:
    NTFY_USER: "$[[ inputs.ntfy_user ]]"
    NTFY_PASS: "$[[ inputs.ntfy_pass ]]"
    MSG_BODY: "$[[ inputs.inventory_file ]]"
    MSG_PRIO: "$[[ inputs.remote_ssh ]]"
    MSG_TAG: "$[[ inputs.remote_ssh ]]"
  before_script: |
    echo "---------------------------------------------------------------------------"
    echo "ntfy GitOps Component 🔔 - preparing environment - Building an alpine image to send a web-push notification via ntfy ..."
    echo "---------------------------------------------------------------------------"
    echo "Installing dependencies [curl]..."
    apk add --no-cache curl >/dev/null
  script: |
    echo "---------------------------------------------------------------------------"
    echo "ntfy GitOps Component 🔔 - web-push - Now sending a web-push notification via ntfy..."
    
    message="${CI_PROJECT_NAME}: ${MSG_STATE} (ref ${CI_COMMIT_REF_NAME})"
    curl -u "${NOTIFY_USER}:${NOTIFY_PASSWORD}" -H "${MSG_TAG}" -H "${MSG_PRIO}" -d "${message}" "${NOTIFY_ADDRESS}/gitlab"
    
    echo "---------------------------------------------------------------------------"
    echo # ntfy GitOps Component 🔔 - web-push - Sent web-push notification via ntfy... ✅"
    echo "---------------------------------------------------------------------------"
  rules:
    - if: '$CI_COMMIT_REF_NAME == "main"'
      #changes:
        #- '$[[ inputs.root_dir ]]/$[[ inputs.project_file ]]'


.send_notification_commands: 
  script:
    - >
      message="${CI_PROJECT_NAME}: ${MSG_STATE} (ref ${CI_COMMIT_REF_NAME})";
      curl -u "${NOTIFY_USER}:${NOTIFY_PASSWORD}" \
           -H "${MSG_TAG}"                        \
           -H "${MSG_PRIO}"                       \
           -d "${message}"                        \
           "${NOTIFY_ADDRESS}/gitlab";

send_notification_success:
  stage: notify
  when: on_success
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/curlimages/curl:8.6.0
  variables:
    MSG_STATE: "success"
    MSG_TAG: "tags:smiley_cat"
    MSG_PRIO: "prio:low"
  script:
    - !reference [.send_notification_commands, script]
  tags:
    - docker

send_notification_failure:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/curlimages/curl:8.6.0
  stage: notify
  when: on_failure
  variables:
    PIPELINE_STATE: "fail"
    MSG_TAG: "tags:scream_cat"
    MSG_PRIO: "prio:high"    
  script:
    - !reference [.send_notification_commands, script]
  tags:
    - docker