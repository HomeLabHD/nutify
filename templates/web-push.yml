
---
spec:
  inputs:
    as:
      default: ntfy-web-push
      description: 'The name of the Gitlab CI/CD job that will be generated by this component.'
    stage:
      default: ntfy
      description: 'The name of the stage that the job this component generates will belong to..'
    ntfy_user:
      description: 'The *username* that will be used to authenticate to ntfy and send a web-push notification'
    ntfy_pass:
      description: 'The *password* that will be used to authenticate to ntfy and send a web-push notification.'
    ntfy_url:
      default: 'https://ntfy.pcfae.com/ad_arbitorium-gitops'
      description: 'The valid URL (https://ntfy.sh/gitlab) of the remote ntfy instance that the web-push notification will be sent to.'
    msg_action:
      description: ''
    msg_attach:
    msg_body:
      default: '${CI_PROJECT_NAME}: ${MSG_STATE} (ref ${CI_COMMIT_REF_NAME})'
      description: 'The message that should be sent using this ntfy component.'
    msg_click:
    msg_email:
    msg_markdown:
      default: false
      description: 'If this value is set to true, the message body will be processed as markdown formatted text.'
    msg_priority:
      default: 'prio:low'
      description: 'The priority level of the notification that will be sent.'
    msg_tags:
      description: ' Comma seperated list of Tags/Emoji that the message should be marked with. (i.e. tags:scream_cat,smiley_cat)'
    msg_title: ''

---

'$[[ inputs.as ]]':
  stage: '$[[ inputs.stage ]]'
  image:
    name: alpine:latest
    entrypoint: [""]
  variables:
    NTFY_USER: "$[[ inputs.ntfy_user ]]"
    NTFY_PASS: "$[[ inputs.ntfy_pass ]]"
    NTFY_URL: "$[[ inputs.ntfy_url ]]"
    MSG_ACTION: "$[[ inputs.msg_action ]]"
    MSG_ATTACH: "$[[ inputs.msg_attach ]]"
    MSG_BODY: "$[[ inputs.msg_body ]]"
    MSG_CLICK: "$[[ inputs.msg_click ]]"
    # MSG_EMAIL: "$[[ inputs.msg_email ]]"
    MSG_MARKDOWN: "$[[ inputs.msg_markdown ]]"
    MSG_PRIORITY: "$[[ inputs.msg_priority ]]"
    MSG_TAGS: "$[[ inputs.msg_tags ]]"
    MSG_TITLE: "$[[ inputs.msg_title ]]"
  before_script: |
    echo "---------------------------------------------------------------------------"
    echo "ntfy GitOps Component 🔔 - preparing environment - Building an alpine image to send a web-push notification via ntfy ..."
    echo "---------------------------------------------------------------------------"
    echo "Installing dependencies [curl]..."
    apk add --no-cache curl >/dev/null
  script: |
    echo "---------------------------------------------------------------------------"
    echo "ntfy GitOps Component 🔔 - web-push - Now sending a web-push notification via ntfy..."
    curl \
      -d "${MSG_BODY}" \
      -H "Actions: ${MSG_ACTION}" \
      -H "Attach: ${MSG_ATTACH}" \
      -H "Click: ${MSG_CLICK}" \
      -H "Markdown: ${MSG_MARKDOWN}" \
      -H "Priority: ${MSG_PRIORITY}" \
      -H "Tags: ${MSG_TAGS}" \
      -H "Title: ${MSG_TITLE}" \
      -u "${NOTIFY_USER}:${NOTIFY_PASS}" \
      "${NTFY_URL}"
      # -H "Email: "$MSG_EMAIL"
    echo "---------------------------------------------------------------------------"
    echo # ntfy GitOps Component 🔔 - web-push - Sent web-push notification via ntfy... ✅"
    echo "---------------------------------------------------------------------------"
  rules:
    - if: '$CI_COMMIT_REF_NAME == "main"'
      #changes:
        #- '$[[ inputs.root_dir ]]/$[[ inputs.project_file ]]'
